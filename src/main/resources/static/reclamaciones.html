<!DOCTYPE html>
<html lang="es-PE">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libro de Reclamaciones - KOKY</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .claim-container { max-width: 700px; margin: 40px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e0e0e0; }
        .book-header { text-align: center; margin-bottom: 30px; }
        .book-header i { font-size: 3rem; color: #FE4A49; margin-bottom: 10px; }
        .book-header h2 { font-size: 2rem; color: #333; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; height: 100px; resize: none; font-family: 'Poppins'; }
        .radio-group { display: flex; gap: 20px; margin-top: 5px; }
        @media(max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- Top Bar y Header -->
    <div class="top-bar"><div class="container"><span><i class="fa-solid fa-bolt"></i> Atención rápida</span></div></div>
    <header class="main-header"><div class="container"><a href="index.html" class="logo">KOKY</a></div></header>

    <main>
        <div class="container">
            <div class="claim-container">
                <div class="book-header">
                    <i class="fa-solid fa-book-open"></i>
                    <h2>Libro de Reclamaciones</h2>
                    <p>Lamentamos los inconvenientes. Cuéntanos qué pasó.</p>
                </div>

                <form id="claim-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nombre Completo</label>
                            <input type="text" id="nombre" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Teléfono</label>
                            <input type="tel" id="telefono" class="form-control" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label>Tipo de Registro</label>
                        <div class="radio-group">
                            <label><input type="radio" name="tipo" value="RECLAMO" checked> Reclamo (Producto)</label>
                            <label><input type="radio" name="tipo" value="QUEJA"> Queja (Atención)</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Detalle del Incidente</label>
                        <textarea id="detalle" required placeholder="Describe brevemente lo sucedido..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-secondary btn-full-width">Enviar Reclamo</button>
                </form>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Auto-rellenar si está logueado
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if(currentUser) {
                document.getElementById('nombre').value = currentUser.name + ' ' + (currentUser.lastname || '');
                document.getElementById('email').value = currentUser.email;
            }

            document.getElementById('claim-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const data = {
                    userId: currentUser ? currentUser.dbUserId : null,
                    nombre: document.getElementById('nombre').value,
                    email: document.getElementById('email').value,
                    telefono: document.getElementById('telefono').value,
                    tipo: document.querySelector('input[name="tipo"]:checked').value,
                    detalle: document.getElementById('detalle').value
                };

                try {
                    const res = await fetch('http://72.61.9.249:9000/api/reclamos/crear', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(data)
                    });
                    
                    const result = await res.json();
                    
                    if(res.ok) {
                        alert(`Registrado correctamente.\nTu código de seguimiento es: ${result.codigo}`);
                        window.location.href = 'index.html';
                    } else {
                        alert('Error: ' + result.error);
                    }
                } catch(err) {
                    alert('Error de conexión.');
                }
            });
        });
    </script>
</body>
</html>
